<article class="survey-list-card">
    <p class="survey-list-card__category">
        {{ survey().category }}
    </p>

    <h3 class="survey-list-card__title">
        {{ survey().title }}
    </h3>

    <p class="survey-list-card__description">
        {{ survey().description }}
    </p>

    <footer class="survey-list-card__footer">
        <span class="survey-list-card__badge">
            {{ endingLabel() }}
        </span>
    </footer>
</article>
