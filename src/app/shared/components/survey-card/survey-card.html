<article class="survey-card">
  <p class="survey-card__category">
    {{ survey().category }}
  </p>

  <h3 class="survey-card__title">
    {{ survey().title }}
  </h3>

  <p class="survey-card__description">
    {{ survey().description }}
  </p>

  <footer class="survey-card__footer">
    <span class="survey-card__badge">
      {{ endingLabel() }}
    </span>
  </footer>
</article>
